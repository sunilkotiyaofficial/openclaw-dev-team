
services:
  # ── Kafka (KRaft mode — no ZooKeeper) ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    networks:
      - order-network

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - order-network

  # ── MongoDB (one per service — no shared DB) ───────────────────────────────
  mongodb-orders:
    image: mongo:7.0
    container_name: mongodb-orders
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: orders_db
    volumes:
      - mongodb-orders-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  mongodb-payments:
    image: mongo:7.0
    container_name: mongodb-payments
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: payments_db
    volumes:
      - mongodb-payments-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  mongodb-inventory:
    image: mongo:7.0
    container_name: mongodb-inventory
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_DATABASE: inventory_db
    volumes:
      - mongodb-inventory-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  mongodb-shipping:
    image: mongo:7.0
    container_name: mongodb-shipping
    ports:
      - "27020:27017"
    environment:
      MONGO_INITDB_DATABASE: shipments_db
    volumes:
      - mongodb-shipping-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  # ── Microservices ──────────────────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8081:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_MONGODB_URI: mongodb://mongodb-orders:27017/orders_db
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8080"
    depends_on:
      kafka:
        condition: service_healthy
      mongodb-orders:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - order-network

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8082:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_MONGODB_URI: mongodb://mongodb-payments:27017/payments_db
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8080"
    depends_on:
      kafka:
        condition: service_healthy
      mongodb-payments:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - order-network

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8083:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_MONGODB_URI: mongodb://mongodb-inventory:27017/inventory_db
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8080"
    depends_on:
      kafka:
        condition: service_healthy
      mongodb-inventory:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - order-network

  shipping-service:
    build:
      context: .
      dockerfile: shipping-service/Dockerfile
    container_name: shipping-service
    ports:
      - "8084:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_MONGODB_URI: mongodb://mongodb-shipping:27017/shipments_db
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8080"
    depends_on:
      kafka:
        condition: service_healthy
      mongodb-shipping:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - order-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      order-service:
        condition: service_healthy
    networks:
      - order-network

networks:
  order-network:
    driver: bridge

volumes:
  mongodb-orders-data:
  mongodb-payments-data:
  mongodb-inventory-data:
  mongodb-shipping-data:
