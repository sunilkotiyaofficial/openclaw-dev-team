name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build shared modules
        run: mvn install -pl common-events,common-kafka,kafka-config -DskipTests -q

      - name: Run service tests (Testcontainers needs Docker)
        run: mvn test -pl order-service,payment-service,inventory-service,shipping-service
        env:
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'

  build-and-push:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push order-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: order-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/order-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/order-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push payment-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: payment-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push inventory-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: inventory-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/inventory-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/inventory-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push shipping-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: shipping-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shipping-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/shipping-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
